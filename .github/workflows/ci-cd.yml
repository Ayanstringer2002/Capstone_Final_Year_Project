name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install testing dependencies
      run: |
        pip install pytest flake8 black isort

    - name: Run syntax checks
      run: |
        python -m py_compile app.py
        python -m py_compile pages/*.py
        python -m py_compile utils/*.py
        python -m py_compile database/*.py

    - name: Run tests with pytest
      run: |
        pytest tests/ -v

    - name: Check code formatting with Black
      run: |
        black --check --diff . || echo "Code formatting issues found. Run 'black .' to fix."

    - name: Check imports sorting with isort
      run: |
        isort --check-only --diff . || echo "Import sorting issues found. Run 'isort .' to fix."

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || echo "Linting issues found"
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to Streamlit Cloud
      run: |
        echo "🚀 Deployment triggered!"
        echo "Streamlit Cloud will auto-deploy from main branch"
        echo "Monitor deployment at: https://share.streamlit.io/${{ github.repository }}/main"